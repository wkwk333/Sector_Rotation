name: Publish dashboard

# Phase 0: manual trigger only for now. Once verified, phase 1 adds a
# schedule trigger and publishing to GitHub Pages.
on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (steps 1-3)
        run: python run_pipeline.py

      - name: Run top holdings (step 4)
        run: python top_holdings.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-output
          path: output/
          retention-days: 7
