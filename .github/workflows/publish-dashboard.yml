name: Publish dashboard

# Runs the pipeline daily after US market close and publishes the latest
# dashboard/top-holdings images to GitHub Pages for the Android viewer app.
# Note: fixed UTC time does not auto-adjust for US daylight saving.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ubuntu-latest has no Japanese-capable font installed by default.
      # Without this, all Japanese text in the charts renders as tofu boxes.
      - name: Install Japanese font
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -f

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (steps 1-3)
        run: python run_pipeline.py

      - name: Run top holdings (step 4)
        run: python top_holdings.py

      - name: Prepare files for publishing
        run: python publish_latest.py

      - name: Upload full output as artifact (debugging aid)
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-output
          path: output/
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
