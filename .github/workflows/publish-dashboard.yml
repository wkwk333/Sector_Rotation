name: Publish dashboard

# フェーズ0: まずは手動実行のみ。CI上でパイプラインが問題なく動くことを
# 確認できたら、フェーズ1で schedule トリガーと公開処理(GitHub Pages)を追加する。
on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (steps 1-3)
        run: python run_pipeline.py

      - name: Run top holdings (step 4)
        run: python top_holdings.py

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-output
          path: output/
          retention-days: 7
